<!doctype html>
<html>
  <head>
    <!-- Bootstrap CSS framework for responsive layout and UI components -->
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
      integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z"
      crossorigin="anonymous"
    />

    <!-- Font Awesome icons library -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />

    <!-- Local stylesheet -->
    <link rel="stylesheet" href="../static/style.css" />

    <!-- Flask dynamic static CSS path -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />

    <!-- jQuery library -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>

    <!-- Local JavaScript file -->
    <script src="../static/script.js"></script>
  </head>

  <body>
    <!-- Main container that takes full viewport height -->
    <div class="container d-flex flex-column vh-100">
      <!-- Header Row -->
      <div class="row">
        <!-- Page title -->
        <div class="col-12" style="margin-top: 2rem">
          <h1 class="text-center mb-3">Personal Data Assistant</h1>
        </div>

        <!-- Light/Dark mode toggle switch -->
        <div class="col-12 text-center">
          <div class="custom-control custom-switch mb-3">
            <!-- Toggle switch checkbox -->
            <input
              type="checkbox"
              class="custom-control-input"
              id="light-dark-mode-switch"
            />

            <!-- Toggle label -->
            <label class="custom-control-label" for="light-dark-mode-switch">
              Toggle light/dark mode
            </label>
          </div>
        </div>
      </div>

      <!-- Chat section -->
      <div class="row flex-grow-1 overflow-auto">
        <!-- Centered responsive chat container -->
        <div class="col-12 col-md-8 mx-auto d-flex flex-column">
          <!-- Chat window -->
          <div id="chat-window" class="p-3">
            <!-- All messages will be dynamically inserted here -->
            <div id="message-list"></div>

            <!-- Custom loading animation -->
            <div class="loading-animation my-loading">
              <div class="loading-dots my-loading">
                <!-- Animated loading dots -->
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
              </div>
            </div>

            <!-- Secondary loading animation -->
            <div class="loading-animation">
              <div class="loading-dots">
                <!-- Animated loading dots -->
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
              </div>
            </div>
          </div>

          <!-- User input section -->
          <div class="input-group mt-1">
            <!-- Text input field -->
            <input
              type="text"
              id="message-input"
              class="form-control"
              placeholder="Type your message here..."
            />

            <!-- Buttons attached to the input -->
            <div class="input-group-append">
              <!-- Send message button -->
              <button id="send-button" class="btn btn-primary send">
                <!-- Paper plane icon -->
                <i class="fa fa-paper-plane"></i>
              </button>

              <!-- Reset conversation button -->
              <button id="reset-button" class="btn btn-primary reset">
                <!-- Refresh icon -->
                <i class="fa fa-refresh"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
